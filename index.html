<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HGIANG HỌC TIẾNG TRUNG</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:#eef3f9;

display:flex;

min-height:100vh;

}

.sidebar{

width:260px;

background:#123d7a;

color:white;

padding:30px 20px;

position:fixed;

left:0;

top:0;

bottom:0;

}

.logo{

text-align:center;

margin-bottom:40px;

}

.logo-circle{

width:75px;

height:75px;

background:white;

color:#123d7a;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

font-size:28px;

font-weight:bold;

margin:auto;

margin-bottom:15px;

}

.logo h2{

font-size:23px;

line-height:34px;

}

.menu{

list-style:none;

}

.menu li{

margin-bottom:12px;

}

.menu a{

display:block;

padding:14px 18px;

border-radius:12px;

text-decoration:none;

color:white;

font-size:16px;

transition:.25s;

}

.menu a:hover{

background:rgba(255,255,255,.15);

}

.content{

margin-left:260px;

width:calc(100% - 260px);

padding:40px;

}

.page-title{

font-size:34px;

font-weight:700;

color:#123d7a;

margin-bottom:30px;

}

.cards{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:22px;

margin-bottom:35px;

}

.card{

background:white;

border-radius:20px;

padding:28px;

box-shadow:0 8px 20px rgba(0,0,0,.08);

}

.card h3{

font-size:15px;

color:#888;

margin-bottom:15px;

font-weight:500;

}

.card .number{

font-size:38px;

font-weight:700;

color:#123d7a;

}

.function-title{

font-size:26px;

font-weight:700;

margin-bottom:20px;

color:#123d7a;

}

.function-grid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:25px;

}

.function-box{

background:white;

border-radius:20px;

padding:35px;

text-align:center;

box-shadow:0 8px 20px rgba(0,0,0,.08);

transition:.25s;

cursor:pointer;

}

.function-box:hover{

transform:translateY(-6px);

}

.function-icon{

font-size:55px;

margin-bottom:20px;

}

.function-name{

font-size:22px;

font-weight:700;

margin-bottom:10px;

color:#123d7a;

}

.function-desc{

font-size:15px;

color:#777;

line-height:24px;

}

@media(max-width:1200px){

.cards{

grid-template-columns:repeat(2,1fr);

}

.function-grid{

grid-template-columns:repeat(2,1fr);

}

}

@media(max-width:768px){

.sidebar{

position:relative;

width:100%;

}

.content{

margin-left:0;

width:100%;

padding:20px;

}

.cards{

grid-template-columns:1fr;

}

.function-grid{

grid-template-columns:1fr;

}

}

<body>

<div class="sidebar">

    <div class="logo">

        <div class="logo-circle">
            HG
        </div>

        <h2>
            HGIANG<br>
            HỌC TIẾNG TRUNG
        </h2>

    </div>

    <ul class="menu">

        <li>
            <a href="index.html">
                🏠 Trang chủ
            </a>
        </li>

        <li>
            <a href="library.html">
                📚 Thư viện
            </a>
        </li>

        <li>
            <a href="flashcard.html">
                🎴 Flashcard
            </a>
        </li>

        <li>
            <a href="quiz.html">
                📝 Quiz
            </a>
        </li>

        <li>
            <a href="chinese.html">
                🎯 Học tiếng Trung
            </a>
        </li>

        <li>
            <a href="review.html">
                📖 Review
            </a>
        </li>

        <li>
            <a href="#">
                📊 Thống kê
            </a>
        </li>

        <li>
            <a href="#">
                ⚙️ Cài đặt
            </a>
        </li>

    </ul>

</div>

<div class="content">

    <div class="page-title">
        🇨🇳 HGIANG HỌC TIẾNG TRUNG
    </div>

    <div class="cards">

        <div class="card">
            <h3>Tổng từ vựng</h3>
            <div class="number" id="totalWords">0</div>
        </div>

        <div class="card">
            <h3>Đã học</h3>
            <div class="number">0</div>
        </div>

        <div class="card">
            <h3>Từ yêu thích</h3>
            <div class="number">0</div>
        </div>

        <div class="card">
            <h3>Chuỗi ngày học</h3>
            <div class="number">0</div>
        </div>

    </div>

    <div class="function-title">

        Chọn chức năng học

    </div>

    <div class="function-grid">

        <div class="function-box"
             onclick="location.href='flashcard.html'">

            <div class="function-icon">
                🎴
            </div>

            <div class="function-name">
                Flashcard
            </div>

            <div class="function-desc">
                Học từ vựng bằng thẻ ghi nhớ.
            </div>

        </div>

        <div class="function-box"
             onclick="location.href='quiz.html'">

            <div class="function-icon">
                📝
            </div>

            <div class="function-name">
                Quiz
            </div>

            <div class="function-desc">
                Kiểm tra kiến thức bằng câu hỏi trắc nghiệm.
            </div>

        </div>

        <div class="function-box"
             onclick="location.href='chinese.html'">

            <div class="function-icon">
                🎯
            </div>

            <div class="function-name">
                Học tiếng Trung
            </div>

            <div class="function-desc">
                Luyện gõ Hán tự theo nghĩa tiếng Việt.
            </div>

        </div>

        <div class="function-box"
             onclick="location.href='library.html'">

            <div class="function-icon">
                📚
            </div>

            <div class="function-name">
                Thư viện
            </div>

            <div class="function-desc">
                Quản lý toàn bộ từ vựng.
            </div>

        </div>

        <div class="function-box"
             onclick="location.href='review.html'">

            <div class="function-icon">
                📖
            </div>

            <div class="function-name">
                Review
            </div>

            <div class="function-desc">
                Ôn tập các từ đã học.
            </div>

        </div>

        <div class="function-box">

            <div class="function-icon">
                📊
            </div>

            <div class="function-name">
                Thống kê
            </div>

            <div class="function-desc">
                Theo dõi tiến độ học tập của bạn.
            </div>

        </div>

    </div>

    <script>

let words =
JSON.parse(
localStorage.getItem("words")
) || [];

document.getElementById("totalWords").innerText =
words.length;

</script>

</div>

</body>

</html>
    
</style>

</head>
