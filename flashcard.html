<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flashcard - HGIANG HỌC TIẾNG HÀN</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
background:#f4f7fb;
min-height:100vh;
}

/*=========================
SIDEBAR
=========================*/

.sidebar{

width:250px;
background:#122c5a;
color:white;
padding:30px 20px;

}

.logo{

text-align:center;
margin-bottom:40px;

}

.logo-circle{

width:70px;
height:70px;
background:white;
color:#122c5a;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
margin:auto;
margin-bottom:15px;

}

.logo h2{

font-size:22px;

}

.menu{

list-style:none;

}

.menu li{

margin-bottom:12px;

}

.menu a{

display:block;
padding:14px;
color:white;
text-decoration:none;
border-radius:10px;
transition:.25s;

}

.menu a:hover{

background:rgba(255,255,255,.15);

}

.menu .active{

background:white;
color:#122c5a;
font-weight:bold;

}

/*=========================
CONTENT
=========================*/

.content{

flex:1;
padding:35px;

}

.page-title{

font-size:34px;
font-weight:bold;
color:#122c5a;
margin-bottom:30px;

}

.flashcard-box{

background:white;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,.08);
padding:40px;

}

.card{

height:320px;
background:#f7f9ff;
border-radius:20px;

display:flex;
align-items:center;
justify-content:center;
flex-direction:column;

cursor:pointer;

transition:.3s;

}

.card:hover{

transform:scale(1.01);

}

.word{

font-size:54px;
font-weight:bold;
color:#122c5a;

}

.meaning{

margin-top:25px;
display:none;
text-align:center;

}

.pronunciation{

font-size:22px;
color:#666;
margin-bottom:10px;

}

.translate{

font-size:30px;
font-weight:bold;

}

.buttons{

margin-top:35px;

display:flex;
justify-content:center;
gap:15px;

}

button{

padding:13px 25px;
border:none;
border-radius:10px;
background:#122c5a;
color:white;
cursor:pointer;
font-size:16px;

}

button:hover{

opacity:.9;

}

.info{

margin-top:30px;
text-align:center;
font-size:18px;
font-weight:bold;
color:#666;

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">

<div class="logo-circle">

HG

</div>

<h2>

HGIANG<br>
HỌC TIẾNG HÀN

</h2>

</div>

<ul class="menu">

<li><a href="index.html">🏠 Dashboard</a></li>

<li><a href="library.html">📚 Thư viện</a></li>

<li><a class="active" href="flashcard.html">🎴 Flashcard</a></li>

<li><a href="quiz.html">📝 Quiz</a></li>

<li><a href="chinese.html">⌨️ Học tiếng Trung</a></li>

<li><a href="#">📊 Thống kê</a></li>

<li><a href="#">⚙️ Cài đặt</a></li>

</ul>

</div>

<div class="content">

<div class="page-title">

🎴 Flashcard

</div>

<div class="flashcard-box">

<div
class="card"
onclick="toggleMeaning()"
>

<div
class="word"
id="flashcard">

안녕하세요

</div>

<div
class="meaning"
id="meaningBox">

<div
class="pronunciation">

annyeonghaseyo

</div>

<div
class="translate">

Xin chào

</div>

</div>

</div>

<div class="buttons">

<button onclick="prevCard()">

⬅ Trước

</button>

<button onclick="toggleMeaning()">

Hiện nghĩa

</button>

<button onclick="nextCard()">

Sau ➜

</button>

</div>

<div
class="info"
id="cardIndex">

0 / 0

</div>

</div>

</div>
<script>

let words = JSON.parse(localStorage.getItem("words")) || [];

let currentCard = 0;
let showMeaning = false;

function renderFlashcard(){

    if(words.length===0){

        document.getElementById("flashcard").innerHTML="Chưa có từ vựng";

        document.getElementById("meaningBox").style.display="none";

        document.getElementById("cardIndex").innerHTML="0 / 0";

        return;

    }

    let word = words[currentCard];

    document.getElementById("flashcard").innerHTML =
    word.korean;

    document.getElementById("meaningBox").innerHTML =
    `
    <div class="pronunciation">
        ${word.pronunciation}
    </div>

    <div class="translate">
        ${word.meaning}
    </div>
    `;

    document.getElementById("meaningBox").style.display =
    showMeaning ? "block" : "none";

    document.getElementById("cardIndex").innerHTML =
    (currentCard+1) + " / " + words.length;

}

function toggleMeaning(){

    if(words.length===0) return;

    showMeaning=!showMeaning;

    renderFlashcard();

}

function nextCard(){

    if(words.length===0) return;

    currentCard++;

    if(currentCard>=words.length){

        currentCard=0;

    }

    showMeaning=false;

    renderFlashcard();

}

function prevCard(){

    if(words.length===0) return;

    currentCard--;

    if(currentCard<0){

        currentCard=words.length-1;

    }

    showMeaning=false;

    renderFlashcard();

}

document.addEventListener("keydown",function(e){

    if(e.key==="ArrowRight"){

        nextCard();

    }

    if(e.key==="ArrowLeft"){

        prevCard();

    }

    if(e.key===" "){

        e.preventDefault();

        toggleMeaning();

    }

});

renderFlashcard();

</script>

</body>

</html>
