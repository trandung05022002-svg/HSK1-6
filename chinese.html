<body>

<div class="content">

<div class="title">

⌨️ Học tiếng Trung

</div>

<div class="study-box">

<div

class="meaning"

id="chinaQuestion">

Đang tải...

</div>

<input

id="chinaAnswer"

placeholder="Nhập từ tiếng Hàn / Trung">

<div class="buttons">

<button onclick="checkChinaAnswer()">

Kiểm tra

</button>

<button onclick="showChinaAnswer()">

Hiện đáp án

</button>

<button

id="chinaNextBtn"

style="display:none;"

onclick="nextChinaQuestion()">

Next

</button>

</div>

<div

class="result"

id="chinaResult">

</div>

</div>

</div>
<script>

let words = JSON.parse(localStorage.getItem("words")) || [];

let chinaOrder = [];
let chinaPosition = 0;
let currentChinaWord = null;

function shuffleChina(){

    chinaOrder = [];

    for(let i=0;i<words.length;i++){
        chinaOrder.push(i);
    }

    chinaOrder.sort(()=>Math.random()-0.5);

    chinaPosition = 0;

}

function nextChinaQuestion(){

    words = JSON.parse(localStorage.getItem("words")) || [];

    if(words.length===0){

        document.getElementById("chinaQuestion").innerHTML =
        "Chưa có từ vựng";

        return;

    }

    if(
        chinaOrder.length===0 ||
        chinaPosition>=chinaOrder.length
    ){

        shuffleChina();

    }

    currentChinaWord =
    words[
        chinaOrder[chinaPosition]
    ];

    chinaPosition++;

    document.getElementById("chinaQuestion").innerHTML =
    currentChinaWord.meaning;

    document.getElementById("chinaAnswer").value="";

    document.getElementById("chinaResult").innerHTML="";

    document.getElementById("chinaNextBtn").style.display =
    "none";

    document.getElementById("chinaAnswer").focus();

}

function checkChinaAnswer(){

    if(!currentChinaWord) return;

    const answer =
    document
    .getElementById("chinaAnswer")
    .value
    .trim();

    if(answer===currentChinaWord.korean){

        document.getElementById("chinaResult").innerHTML=

        `
        ✅ Chính xác

        <br><br>

        ${currentChinaWord.korean}

        <br>

        ${currentChinaWord.pronunciation}
        `;

        document.getElementById("chinaResult").style.color =
        "green";

        document.getElementById("chinaNextBtn").style.display =
        "inline-block";

    }else{

        document.getElementById("chinaResult").innerHTML=

        "❌ Sai rồi";

        document.getElementById("chinaResult").style.color =
        "red";

    }

}

function showChinaAnswer(){

    if(!currentChinaWord) return;

    document.getElementById("chinaResult").innerHTML=

    `
    📖 Đáp án

    <br><br>

    ${currentChinaWord.korean}

    <br>

    ${currentChinaWord.pronunciation}
    `;

    document.getElementById("chinaResult").style.color =
    "#122c5a";

    document.getElementById("chinaNextBtn").style.display =
    "inline-block";

}

document
.getElementById("chinaAnswer")
.addEventListener("keydown",function(e){

    if(e.key==="Enter"){

        e.preventDefault();
        checkChinaAnswer();

    }

    if(e.key==="ArrowRight"){

        e.preventDefault();

        if(document.getElementById("chinaNextBtn").style.display!=="none"){

            nextChinaQuestion();

        }

    }

});

nextChinaQuestion();

</script>

</body>
